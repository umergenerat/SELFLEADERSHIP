<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="40%" stop-color="#4338ca" />
      <stop offset="100%" stop-color="#312e81" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" fill="url(#bg)" rx="110" />
  
  <!-- Dynamic Rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6" />
  <circle cx="256" cy="256" r="140" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="10 10" />
  
  <!-- Compass Top Right -->
  <path d="M256 120 L320 256 L256 270 Z" fill="#fbbf24" />
  <!-- Compass Top Left -->
  <path d="M256 120 L192 256 L256 270 Z" fill="#fef3c7" />
  <!-- Compass Bottom Right -->
  <path d="M256 392 L320 256 L256 270 Z" fill="rgba(255,255,255,0.4)" />
  <!-- Compass Bottom Left -->
  <path d="M256 392 L192 256 L256 270 Z" fill="rgba(255,255,255,0.8)" />
  
  <!-- Center Dot -->
  <circle cx="256" cy="270" r="10" fill="#1e1b4b" />
  
  <!-- Guiding Star -->
  <path d="M256 40 L264 65 L289 73 L264 81 L256 106 L248 81 L223 73 L248 65 Z" fill="#fde68a" filter="url(#glow)" />
</svg>
